<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Icon Generator - Dolsan Feeding System</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: #0F172A;
            color: #fff;
        }
        h1 {
            color: #60A5FA;
        }
        .icon-preview {
            display: flex;
            gap: 20px;
            margin: 30px 0;
            flex-wrap: wrap;
        }
        .icon-item {
            text-align: center;
        }
        canvas {
            border: 2px solid #60A5FA;
            border-radius: 8px;
            background: #1E293B;
        }
        button {
            background: linear-gradient(135deg, #60A5FA 0%, #3B82F6 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            margin: 10px 5px;
        }
        button:hover {
            background: linear-gradient(135deg, #3B82F6 0%, #2563EB 100%);
        }
        .instructions {
            background: #1E293B;
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
            border-left: 4px solid #60A5FA;
        }
    </style>
</head>
<body>
    <h1>🎨 PWA Icon Generator</h1>
    <p>Generate PNG icons for the Dolsan Feeding System PWA</p>

    <div class="instructions">
        <h3>Instructions:</h3>
        <ol>
            <li>Click "Generate Icons" button below</li>
            <li>Right-click each icon and "Save image as..."</li>
            <li>Save as <code>icon-192x192.png</code> and <code>icon-512x512.png</code></li>
            <li>Place the PNG files in the <code>/icons/</code> directory</li>
        </ol>
    </div>

    <button onclick="generateIcons()">Generate Icons</button>

    <div class="icon-preview" id="iconPreview"></div>

    <script>
        function generateIcons() {
            const sizes = [192, 512];
            const preview = document.getElementById('iconPreview');
            preview.innerHTML = '';

            sizes.forEach(size => {
                const canvas = document.createElement('canvas');
                canvas.width = size;
                canvas.height = size;
                const ctx = canvas.getContext('2d');

                // Draw icon
                drawIcon(ctx, size);

                // Create preview
                const item = document.createElement('div');
                item.className = 'icon-item';
                item.innerHTML = `
                    <h3>${size}x${size}</h3>
                    <canvas width="${size}" height="${size}" style="width: ${Math.min(size, 200)}px; height: ${Math.min(size, 200)}px;"></canvas>
                    <br>
                    <button onclick="downloadIcon(${size})">Download ${size}x${size}</button>
                `;
                
                const displayCanvas = item.querySelector('canvas');
                const displayCtx = displayCanvas.getContext('2d');
                drawIcon(displayCtx, size);
                
                preview.appendChild(item);
            });
        }

        function drawIcon(ctx, size) {
            const scale = size / 512;

            // Background with rounded corners
            ctx.fillStyle = '#0F172A';
            roundRect(ctx, 0, 0, size, size, 64 * scale);
            ctx.fill();

            // Fish body (ellipse)
            ctx.save();
            ctx.translate(256 * scale, 256 * scale);
            ctx.scale(120 * scale / 120, 80 * scale / 80);
            ctx.beginPath();
            ctx.arc(0, 0, 120 * scale, 0, Math.PI * 2);
            ctx.restore();
            const gradient = ctx.createLinearGradient(0, 0, size, size);
            gradient.addColorStop(0, '#60A5FA');
            gradient.addColorStop(1, '#3B82F6');
            ctx.fillStyle = gradient;
            ctx.globalAlpha = 0.9;
            ctx.fill();
            ctx.globalAlpha = 1;

            // Fish tail
            ctx.beginPath();
            ctx.moveTo(136 * scale, 256 * scale);
            ctx.lineTo(80 * scale, 220 * scale);
            ctx.lineTo(80 * scale, 292 * scale);
            ctx.closePath();
            ctx.fillStyle = gradient;
            ctx.globalAlpha = 0.9;
            ctx.fill();
            ctx.globalAlpha = 1;

            // Fish eye
            ctx.fillStyle = '#0F172A';
            ctx.beginPath();
            ctx.arc(320 * scale, 240 * scale, 12 * scale, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#60A5FA';
            ctx.beginPath();
            ctx.arc(324 * scale, 236 * scale, 4 * scale, 0, Math.PI * 2);
            ctx.fill();

            // Feed particles
            ctx.fillStyle = '#34D399';
            const particles = [
                [256, 140, 8], [280, 160, 6], [232, 155, 7],
                [260, 180, 5], [240, 170, 6]
            ];
            particles.forEach(([x, y, r]) => {
                ctx.beginPath();
                ctx.arc(x * scale, y * scale, r * scale, 0, Math.PI * 2);
                ctx.fill();
            });

            // Korean text "급이"
            ctx.fillStyle = '#60A5FA';
            ctx.font = `bold ${48 * scale}px Arial, sans-serif`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('급이', 256 * scale, 420 * scale);
        }

        function roundRect(ctx, x, y, width, height, radius) {
            ctx.beginPath();
            ctx.moveTo(x + radius, y);
            ctx.lineTo(x + width - radius, y);
            ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
            ctx.lineTo(x + width, y + height - radius);
            ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
            ctx.lineTo(x + radius, y + height);
            ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
            ctx.lineTo(x, y + radius);
            ctx.quadraticCurveTo(x, y, x + radius, y);
            ctx.closePath();
        }

        function downloadIcon(size) {
            const canvas = document.createElement('canvas');
            canvas.width = size;
            canvas.height = size;
            const ctx = canvas.getContext('2d');
            drawIcon(ctx, size);

            canvas.toBlob(blob => {
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `icon-${size}x${size}.png`;
                a.click();
                URL.revokeObjectURL(url);
            });
        }
    </script>
</body>
</html>
